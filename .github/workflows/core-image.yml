name: Core Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag to publish, for example v0.1.0"
        required: true
        type: string
      publish_latest:
        description: "Also tag the image as latest"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CORE_IMAGE: ${{ github.repository_owner }}/orion-core

jobs:
  build-core:
    name: Build Core image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CORE_IMAGE }}
          tags: |
            type=raw,value=${{ inputs.version }}-${{ matrix.arch }}

      - name: Build and publish platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/core/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-core:
    name: Publish Core and Console image
    runs-on: ubuntu-24.04
    needs: build-core
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.CORE_IMAGE }}
          VERSION: ${{ inputs.version }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          tags=(-t "${IMAGE}:sha-${short_sha}" -t "${IMAGE}:${VERSION}")
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            tags+=(-t "${IMAGE}:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
