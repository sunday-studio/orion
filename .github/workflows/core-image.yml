name: Core Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag to publish, for example v0.1.0"
        required: true
        type: string
      publish_latest:
        description: "Also tag the image as latest"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CORE_IMAGE: ${{ github.repository_owner }}/orion-core

jobs:
  publish-core:
    name: Publish Core and Console image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CORE_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/core/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
