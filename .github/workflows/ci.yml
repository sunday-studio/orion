name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      console: ${{ steps.filter.outputs.console }}
      contracts: ${{ steps.filter.outputs.contracts }}
      core: ${{ steps.filter.outputs.core }}
      deploy: ${{ steps.filter.outputs.deploy }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - 'apps/agent/**'
              - 'deploy/scripts/**'
              - 'deploy/systemd/**'
              - 'deploy/launchd/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            console:
              - 'apps/console/**'
              - 'apps/core/openapi.yaml'
              - 'apps/core/docs/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            contracts:
              - 'apps/core/internal/api/**'
              - 'apps/core/internal/db/**'
              - 'apps/core/internal/service/**'
              - 'apps/core/scripts/generate-openapi.sh'
              - 'apps/core/main.go'
              - 'apps/core/openapi.yaml'
              - 'apps/core/docs/**'
              - 'apps/console/src/orion-sdk/**'
              - 'apps/console/orval.config.ts'
              - 'apps/console/package.json'
              - 'apps/console/pnpm-lock.yaml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            core:
              - 'apps/core/**'
              - 'deploy/docker-compose.yml'
              - 'deploy/examples/core-console-compose.yaml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            deploy:
              - 'deploy/**'
              - 'README.md'
              - 'docs/deployment/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'AGENTS.md'
              - '.github/workflows/ci.yml'

  server-agent-format:
    name: Server Agent format
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Check Server Agent formatting
        run: |
          gofmt -l . | tee /tmp/orion-agent-gofmt.txt
          test ! -s /tmp/orion-agent-gofmt.txt
        working-directory: apps/agent

  server-agent-test:
    name: Server Agent tests
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Test Server Agent
        run: go test ./...
        working-directory: apps/agent

  core-format:
    name: Core format
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Check Core formatting
        run: |
          gofmt -l . | tee /tmp/orion-core-gofmt.txt
          test ! -s /tmp/orion-core-gofmt.txt
        working-directory: apps/core

  core-test:
    name: Core tests
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Test Core
        run: go test ./...
        working-directory: apps/core

      - name: Build Core binaries
        run: |
          make core-build CORE_OUTPUT=/tmp/orion-core
          make core-worker-build CORE_WORKER_OUTPUT=/tmp/orion-core-worker

  console-quality:
    name: Console quality
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.console == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console

      - name: Check Console formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            pnpm run format:check
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- apps/console | grep -E '\.(ts|tsx|js|jsx|mjs|css|json)$' || true)"
          if [ -z "$changed_files" ]; then
            echo "No changed Console files need formatting checks."
            exit 0
          fi

          printf '%s\n' "$changed_files" | sed 's#^apps/console/##' | (
            cd apps/console
            xargs pnpm exec oxfmt --check
          )

      - name: Lint Console
        run: pnpm run lint
        working-directory: apps/console

  console-build:
    name: Console build
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.console == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console

      - name: Install Swagger generator
        if: needs.changes.outputs.contracts == 'true'
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate OpenAPI
        if: needs.changes.outputs.contracts == 'true'
        run: make generate-openapi

      - name: Generate Console SDK
        run: pnpm run generate:api
        working-directory: apps/console

      - name: Build Console
        run: make console-build

  console-e2e:
    name: Console E2E
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.console == 'true' || needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console

      - name: Install Swagger generator
        if: needs.changes.outputs.contracts == 'true'
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate OpenAPI
        if: needs.changes.outputs.contracts == 'true'
        run: make generate-openapi

      - name: Generate Console SDK
        run: pnpm run generate:api
        working-directory: apps/console

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/console

      - name: Browser smoke
        run: pnpm run test:e2e
        working-directory: apps/console

  generated-contracts:
    name: Generated contracts
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Install Swagger generator
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Install Console dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console

      - name: Regenerate OpenAPI and SDK
        run: make generate-sdk

      - name: Check generated files are committed
        run: |
          git diff --exit-code -- \
            apps/core/docs \
            apps/core/openapi.yaml

  repository-smoke:
    name: Repository smoke
    runs-on: ubuntu-24.04
    needs: changes
    if: |
      needs.changes.outputs.deploy == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.agent == 'true' ||
      needs.changes.outputs.console == 'true' ||
      needs.changes.outputs.contracts == 'true' ||
      needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: bash -n deploy/scripts/*.sh

      - name: Validate Docker Compose syntax
        run: docker compose -f deploy/docker-compose.yml config >/tmp/orion-compose.yml
        env:
          ORION_ADMIN_USERNAME: ci-admin
          ORION_ADMIN_PASSWORD: ci-password
          ORION_JWT_SECRET: ci-secret-at-least-long-enough

  release-readiness:
    name: Release readiness
    runs-on: ubuntu-24.04
    needs:
      - changes
      - server-agent-test
      - core-test
      - console-quality
      - console-build
      - console-e2e
      - generated-contracts
      - repository-smoke
    if: always()
    steps:
      - name: Check gate results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          SERVER_AGENT_RESULT: ${{ needs['server-agent-test'].result }}
          CORE_RESULT: ${{ needs['core-test'].result }}
          CONSOLE_QUALITY_RESULT: ${{ needs['console-quality'].result }}
          CONSOLE_BUILD_RESULT: ${{ needs['console-build'].result }}
          CONSOLE_E2E_RESULT: ${{ needs['console-e2e'].result }}
          CONTRACTS_RESULT: ${{ needs['generated-contracts'].result }}
          REPOSITORY_SMOKE_RESULT: ${{ needs['repository-smoke'].result }}
        run: |
          failed=0
          for gate in \
            "Changed area detection:${CHANGES_RESULT}" \
            "Server tests:${SERVER_AGENT_RESULT}" \
            "Core tests:${CORE_RESULT}" \
            "Console quality:${CONSOLE_QUALITY_RESULT}" \
            "Console build:${CONSOLE_BUILD_RESULT}" \
            "Console E2E:${CONSOLE_E2E_RESULT}" \
            "Generated contracts:${CONTRACTS_RESULT}" \
            "Repository smoke:${REPOSITORY_SMOKE_RESULT}"
          do
            name="${gate%%:*}"
            result="${gate#*:}"
            case "${result}" in
              success|skipped)
                printf '%s: %s\n' "${name}" "${result}"
                ;;
              *)
                printf '%s: %s\n' "${name}" "${result}"
                failed=1
                ;;
            esac
          done
          exit "${failed}"
