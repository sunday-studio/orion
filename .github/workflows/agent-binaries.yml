name: Agent Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-agent:
    name: Build Agent ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-14
          - goos: darwin
            goarch: arm64
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Build
        run: |
          mkdir -p dist
          make agent-build \
            VERSION="${{ inputs.version }}" \
            GOOS="${{ matrix.goos }}" \
            GOARCH="${{ matrix.goarch }}" \
            AGENT_OUTPUT="../../dist/orion-agent-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/orion-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  publish-agent:
    name: Publish Agent release assets
    runs-on: ubuntu-latest
    needs: build-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Add installer assets
        run: |
          cp deploy/scripts/agent-bootstrap.sh dist/orion-agent-installer.sh
          cp deploy/scripts/agent-install.sh dist/orion-agent-install.sh
          cp deploy/systemd/orion-agent.service dist/orion-agent-systemd.service
          cp deploy/launchd/com.orion.agent.plist dist/com.orion.agent.plist
          cp deploy/examples/home-server-config.yaml dist/orion-agent-config.yaml
          chmod 0755 dist/orion-agent-installer.sh dist/orion-agent-install.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/orion-agent-*
            dist/com.orion.agent.plist
