services:
  orion-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    ports:
      - "8999:8999"
    volumes:
      - orion-data:/data
    environment:
      ORION_DATA_DIR: /data
      ORION_PORT: "8999"
      ORION_ADMIN_USERNAME: ${ORION_ADMIN_USERNAME:-}
      ORION_ADMIN_PASSWORD: ${ORION_ADMIN_PASSWORD:-}
      ORION_JWT_SECRET: ${ORION_JWT_SECRET:-}

volumes:
  orion-data:
