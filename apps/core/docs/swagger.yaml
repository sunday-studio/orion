          severity
        in: query
        name: needs_review
        type: boolean
      - default: 50
        description: Maximum number of incidents to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of incidents to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    count:
                      format: int64
                      type: integer
                    incidents:
                      items:
                        $ref: '#/definitions/api.IncidentResponse'
                      type: array
                    limit:
                      type: integer
                    offset:
                      type: integer
