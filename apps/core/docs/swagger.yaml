  /v1/monitors:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all monitors with optional filters
      operationId: getMonitors
      parameters:
      - default: 50
        description: Maximum number of monitors to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of monitors to skip
        in: query
        name: offset
        type: integer
      - description: Search by monitor, agent, or type
        in: query
        name: search
        type: string
      - description: Filter by health status (up|down|degraded|unknown)
        in: query
        name: health
        type: string
      - description: Filter by monitor type
        in: query
        name: type
        type: string
      - description: Filter by lifecycle status (active|disabled|deleted)
        in: query
        name: lifecycle
        type: string
      - description: Only return stale monitors
        in: query
        name: stale_only
        type: boolean
      - description: Only return monitors with active incidents
        in: query
        name: has_incidents
        type: boolean
      - default: updated_at
        description: Sort column
        in: query
        name: sort
        type: string
      - default: desc
        description: Sort order (asc|desc)
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
