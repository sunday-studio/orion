host: localhost:8999
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Orion Core API for agent management and monitoring
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Orion Core API
  version: "1.0"
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API server
      operationId: getHealth
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              service:
                type: string
              status:
                type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/agents:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all registered agents
      operationId: getAgents
      parameters:
      - default: 50
        description: Maximum number of agents to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of agents to skip
        in: query
        name: offset
        type: integer
      - description: Search by server or monitor name
        in: query
        name: search
        type: string
      - description: Filter by computed server status
        in: query
        name: status
        type: string
      - description: Filter by maintenance mode true or false
        in: query
        name: maintenance
        type: string
      - description: Only return stale servers
        in: query
        name: stale_only
        type: boolean
      - description: Only return servers with active incidents
        in: query
        name: has_incidents
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    agents:
                      items:
                        $ref: '#/definitions/api.AgentResponse'
                      type: array
                    count:
                      format: int64
                      type: integer
                    limit:
                      type: integer
                    offset:
                      type: integer
                    pagination:
                      $ref: '#/definitions/utils.PaginationMeta'
                  type: object
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: List agents
      tags:
      - agents
  /v1/agents/{agent_id}/{monitor_id}/report:
    post:
      consumes:
      - application/json
      description: Receive and store a monitor report for a specific monitor
      operationId: receiveMonitorReport
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Monitor ID
        in: path
        name: monitor_id
        required: true
        type: string
      - description: Monitor report data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/service.MonitorReportPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Receive monitor report
      tags:
      - reports
  /v1/agents/{agent_id}/maintenance:
    put:
      consumes:
      - application/json
      description: Enable or disable maintenance mode for a specific agent
      operationId: setMaintenanceMode
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Maintenance mode request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.SetMaintenanceModeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Set agent maintenance mode
      tags:
      - agents
  /v1/agents/{agent_id}/register-monitor:
    post:
      consumes:
      - application/json
      description: Register a new monitor for a specific agent
      operationId: registerMonitor
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Monitor registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.RegisterMonitorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.RegisterMonitorResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Register a monitor
      tags:
      - monitors
  /v1/agents/{agent_id}/report:
    post:
      consumes:
      - application/json
      description: Receive and store a system metrics report from an agent
      operationId: receiveAgentReport
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Agent report data
