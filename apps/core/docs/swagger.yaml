paths:
  /health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API server
      operationId: getHealth
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              service:
                type: string
              status:
                type: string
            type: object
      summary: Health check
      tags:
      - health
  /status/{slug}:
    get:
      consumes:
      - application/json
      description: Get the public-safe projection of a published or unlisted status
        page
      operationId: getPublicStatusPage
      parameters:
      - description: Status page slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    status_page:
                      $ref: '#/definitions/api.StatusPagePreviewResponse'
                  type: object
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get public status page
      tags:
      - public-status
  /status/{slug}/badge.svg:
    get:
      description: Get an embeddable SVG badge for the current public-safe status
        page state
      operationId: getPublicStatusPageBadge
      parameters:
      - description: Status page slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - image/svg+xml
      responses:
        "200":
          description: SVG badge
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get public status page badge
      tags:
      - public-status
  /status/{slug}/components/{component_id}/badge.svg:
    get:
      description: Get an embeddable SVG badge for a visible public component state
      operationId: getPublicStatusPageComponentBadge
      parameters:
      - description: Status page slug
        in: path
        name: slug
        required: true
        type: string
      - description: Public component ID
        in: path
        name: component_id
        required: true
        type: string
      produces:
      - image/svg+xml
      responses:
        "200":
          description: SVG badge
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get public status page component badge
      tags:
      - public-status
  /status/{slug}/components/{component_id}/history:
    get:
      consumes:
      - application/json
      description: Get sanitized public uptime history for one visible component
      operationId: getPublicStatusPageComponentHistory
      parameters:
      - description: Status page slug
        in: path
        name: slug
        required: true
        type: string
      - description: Public component ID
        in: path
        name: component_id
        required: true
        type: string
      - default: 90d
        description: 'Uptime window: 24h, 7d, 30d, or 90d'
        in: query
        name: window
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    component:
                      $ref: '#/definitions/api.StatusPagePublicComponentResponse'
                    history:
                      items:
                        $ref: '#/definitions/api.StatusPagePublicUptimeBucketResponse'
                      type: array
                    uptime:
                      $ref: '#/definitions/api.StatusPagePublicUptimeResponse'
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get public status page component history
      tags:
      - public-status
