      country:
        type: string
      hostname:
        type: string
      ip:
        type: string
      loc:
        type: string
      org:
        type: string
      postal:
        type: string
      region:
        type: string
      timezone:
        type: string
    type: object
  db.MemoryStats:
    properties:
      available_bytes:
        type: integer
      free_bytes:
        type: integer
      total_bytes:
        type: integer
      used_bytes:
        type: integer
      used_percent:
        type: number
    type: object
  service.AgentReportPayload:
    properties:
      agent_version:
        type: string
      config_summary: {}
      cpu:
        $ref: '#/definitions/db.CPUStats'
      disk:
        $ref: '#/definitions/db.DiskStats'
      location:
        $ref: '#/definitions/db.GeoLocation'
      memory:
        $ref: '#/definitions/db.MemoryStats'
      timestamp:
        type: string
      uptime_seconds:
        type: integer
    type: object
  service.ArchiveRunResult:
    properties:
      agent_reports_archived:
        type: integer
      archive_path:
        type: string
      archive_raw_reports:
        type: boolean
      cutoff:
        type: string
      monitor_reports_archived:
        type: integer
      skipped_because_disabled:
        type: boolean
      skipped_because_no_reports:
        type: boolean
    type: object
  service.DataLifecycleSettingsPayload:
    properties:
      archive_dir:
        type: string
      archive_raw_reports:
        type: boolean
      archive_schedule:
        type: string
      raw_report_hot_days:
        type: integer
      rollup_retention_days:
        type: integer
      rollups_enabled:
        type: boolean
    type: object
  service.MonitorReportPayload:
    properties:
      error: {}
      health:
        description: up | down
        type: string
      metrics: {}
      timestamp:
        type: string
    required:
    - health
    - metrics
    - timestamp
    type: object
  service.MonitorSummary:
    properties:
      degraded:
        type: integer
      down:
        type: integer
      has_incidents:
        type: integer
      stale:
        type: integer
      total:
        type: integer
      unknown:
        type: integer
      up:
        type: integer
    type: object
  service.RegisterMonitorRequest:
    properties:
      agent_id:
        type: string
      description:
        type: string
      last_checked:
        type: string
      meta:
        type: string
      name:
        type: string
      reporting_interval_seconds:
        description: Monitor check interval in seconds
        type: integer
      type:
        type: string
    required:
    - description
    - last_checked
    - name
    - type
    type: object
  service.RegisterMonitorResponse:
    properties:
      monitor_id:
        type: string
    type: object
  service.RegisterRequest:
    properties:
      arch:
        type: string
      machine_id:
        type: string
      meta:
        type: string
      name:
        type: string
      os:
        type: string
      reporting_interval_seconds:
        type: integer
    required:
    - arch
    - machine_id
    - name
    - os
    type: object
  service.RegisterResponse:
    properties:
      agent_id:
        type: string
      token:
        type: string
    type: object
  service.RollupRunResult:
    properties:
      date:
        type: string
      monitor_days:
        type: integer
      report_count:
        type: integer
      skipped_today:
        type: boolean
    type: object
  service.SetMaintenanceModeRequest:
    properties:
      maintenance_mode:
        type: boolean
    required:
    - maintenance_mode
    type: object
  service.UnregisterMonitorRequest:
    properties:
      agent_id:
        type: string
      monitor_id:
        type: string
    required:
    - monitor_id
    type: object
  service.UnregisterMonitorResponse:
    properties:
      success:
        type: boolean
    type: object
  utils.APIResponse:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  utils.PaginationMeta:
    properties:
      current_count:
        type: integer
      current_page:
        type: integer
      has_next:
        type: boolean
      has_previous:
        type: boolean
      limit:
        type: integer
      next_offset:
        type: integer
      offset:
        type: integer
      previous_offset:
        type: integer
      range_end:
        type: integer
      range_start:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
host: localhost:8999
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Orion Core API for agent management and monitoring
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Orion Core API
  version: "1.0"
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API server
      operationId: getHealth
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              service:
                type: string
              status:
                type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/agents:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all registered agents
      operationId: getAgents
      parameters:
      - default: 50
        description: Maximum number of agents to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of agents to skip
        in: query
        name: offset
        type: integer
      - description: Search by server or monitor name
        in: query
        name: search
        type: string
      - description: Filter by computed server status
        in: query
        name: status
        type: string
      - description: Filter by maintenance mode true or false
        in: query
        name: maintenance
        type: string
      - description: Only return stale servers
        in: query
        name: stale_only
        type: boolean
      - description: Only return servers with active incidents
        in: query
        name: has_incidents
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    agents:
                      items:
                        $ref: '#/definitions/api.AgentResponse'
                      type: array
                    count:
                      format: int64
                      type: integer
                    limit:
                      type: integer
                    offset:
                      type: integer
                    pagination:
                      $ref: '#/definitions/utils.PaginationMeta'
                  type: object
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: List agents
      tags:
      - agents
  /v1/agents/{agent_id}/{monitor_id}/report:
    post:
      consumes:
      - application/json
      description: Receive and store a monitor report for a specific monitor
      operationId: receiveMonitorReport
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Monitor ID
        in: path
        name: monitor_id
        required: true
        type: string
      - description: Monitor report data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/service.MonitorReportPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Receive monitor report
      tags:
      - reports
  /v1/agents/{agent_id}/maintenance:
    put:
      consumes:
      - application/json
      description: Enable or disable maintenance mode for a specific agent
      operationId: setMaintenanceMode
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Maintenance mode request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.SetMaintenanceModeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Set agent maintenance mode
      tags:
      - agents
  /v1/agents/{agent_id}/register-monitor:
    post:
      consumes:
      - application/json
      description: Register a new monitor for a specific agent
      operationId: registerMonitor
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Monitor registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.RegisterMonitorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.RegisterMonitorResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Register a monitor
      tags:
      - monitors
  /v1/agents/{agent_id}/report:
    post:
      consumes:
      - application/json
      description: Receive and store a system metrics report from an agent
      operationId: receiveAgentReport
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Agent report data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/service.AgentReportPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.ReportResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Receive agent report
      tags:
      - reports
  /v1/agents/{agent_id}/unregister-monitor:
    post:
      consumes:
      - application/json
      description: Unregister a monitor for a specific agent
      operationId: unregisterMonitor
      parameters:
      - description: Agent ID
        in: path
        name: agent_id
        required: true
        type: string
      - description: Monitor unregistration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UnregisterMonitorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.UnregisterMonitorResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Unregister a monitor
      tags:
      - monitors
  /v1/agents/{id}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific agent including latest
        report
      operationId: getAgent
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    agent:
                      $ref: '#/definitions/api.AgentResponse'
                    latest_report:
                      type: object
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get agent details
      tags:
      - agents
  /v1/agents/{id}/health:
    get:
      consumes:
      - application/json
      description: Get computed health status for a specific agent and its monitors
      operationId: getAgentHealth
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    agent_id:
                      type: string
                    degraded_count:
                      type: integer
                    down_count:
                      type: integer
                    overall_health:
                      type: string
                    up_count:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: Get agent health
      tags:
      - agents
  /v1/agents/{id}/monitors:
    get:
      consumes:
      - application/json
      description: Get a paginated list of monitors for a specific agent with optional
        filters
      operationId: getAgentMonitors
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by health status (up|down|degraded|unknown)
        in: query
        name: health
        type: string
      - description: Filter by lifecycle status (active|disabled|deleted)
        in: query
        name: lifecycle
        type: string
      - default: 50
        description: Maximum number of monitors to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of monitors to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  properties:
                    count:
                      format: int64
                      type: integer
                    limit:
                      type: integer
                    monitors:
                      items:
                        $ref: '#/definitions/api.MonitorResponse'
                      type: array
                    offset:
                      type: integer
                    pagination:
                      $ref: '#/definitions/utils.PaginationMeta'
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      summary: List monitors for an agent
      tags:
      - monitors
  /v1/agents/{id}/reports:
    get:
      consumes:
      - application/json
      description: Get a paginated list of system metric reports for a specific agent
      operationId: getAgentReports
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      - default: 50
        description: Maximum number of reports to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of reports to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
