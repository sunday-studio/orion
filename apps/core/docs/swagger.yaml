  api.IncidentTimelineItemResponse:
    properties:
      alert_delivery_id:
        type: string
      channel:
        type: string
      created_at:
        type: string
      id:
        type: string
      message:
        type: string
      monitor_report_id:
        type: string
      source:
        type: string
      status:
        type: string
      type:
        type: string
