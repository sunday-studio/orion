      id:
        type: string
      incident_state:
        type: string
      last_health_computation:
        type: string
      last_successful_report_at:
        type: string
      lifecycle:
        type: string
      name:
        type: string
      reporting_interval_seconds:
        type: integer
      type:
        type: string
      updated_at:
        type: string
    type: object
  api.OrionEventResponse:
    properties:
      agent_id:
        type: string
      created_at:
        type: string
      id:
        type: string
