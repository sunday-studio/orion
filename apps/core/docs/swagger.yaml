      last_archive_status:
        type: string
      last_rollup_run_at:
        type: string
      raw_report_hot_days:
        type: integer
      rollup_retention_days:
        type: integer
      rollups_enabled:
        type: boolean
      updated_at:
        type: string
    type: object
  db.DiskStats:
    properties:
      free_bytes:
        type: integer
      total_bytes:
        type: integer
      used_bytes:
        type: integer
      used_percent:
        type: number
    type: object
  db.GeoLocation:
    properties:
      city:
