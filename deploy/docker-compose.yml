services:
  orion-core:
    image: ${ORION_CORE_IMAGE:-ghcr.io/sunday-studio/orion-core:latest}
    restart: unless-stopped
    ports:
      - "${ORION_HTTP_PORT:-8999}:8999"
    volumes:
      - orion-data:/data
    environment:
      ORION_DATA_DIR: /data
      ORION_PORT: "8999"
      ORION_ADMIN_USERNAME: ${ORION_ADMIN_USERNAME:?set ORION_ADMIN_USERNAME}
      ORION_ADMIN_PASSWORD: ${ORION_ADMIN_PASSWORD:?set ORION_ADMIN_PASSWORD}
      ORION_JWT_SECRET: ${ORION_JWT_SECRET:?set ORION_JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8999/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  orion-core-worker:
    image: ${ORION_CORE_IMAGE:-ghcr.io/sunday-studio/orion-core:latest}
    restart: unless-stopped
    command: ["./orion-core-worker"]
    depends_on:
      orion-core:
        condition: service_healthy
    volumes:
      - orion-data:/data
    environment:
      ORION_DATA_DIR: /data
      ORION_WORKER_ID: ${ORION_WORKER_ID:-core-monitor-worker}
      ORION_WORKER_HEARTBEAT_SECONDS: ${ORION_WORKER_HEARTBEAT_SECONDS:-15}
      ORION_WORKER_STALE_SECONDS: ${ORION_WORKER_STALE_SECONDS:-60}
      ORION_ADMIN_USERNAME: ${ORION_ADMIN_USERNAME:?set ORION_ADMIN_USERNAME}
      ORION_ADMIN_PASSWORD: ${ORION_ADMIN_PASSWORD:?set ORION_ADMIN_PASSWORD}
      ORION_JWT_SECRET: ${ORION_JWT_SECRET:?set ORION_JWT_SECRET}
    healthcheck:
      test: ["CMD", "./orion-core-worker", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  orion-data:
