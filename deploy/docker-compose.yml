services:
  orion-core:
    image: ${ORION_CORE_IMAGE:-ghcr.io/sunday-studio/orion-core:latest}
    restart: unless-stopped
    ports:
      - "8999:8999"
    volumes:
      - orion-data:/data
    environment:
      ORION_DATA_DIR: /data
      ORION_PORT: "8999"
      ORION_ADMIN_USERNAME: ${ORION_ADMIN_USERNAME:?set ORION_ADMIN_USERNAME}
      ORION_ADMIN_PASSWORD: ${ORION_ADMIN_PASSWORD:?set ORION_ADMIN_PASSWORD}
      ORION_JWT_SECRET: ${ORION_JWT_SECRET:?set ORION_JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8999/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  orion-data: