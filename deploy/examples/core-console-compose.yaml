services:
  orion-core:
    image: ghcr.io/sunday-studio/orion-core:v0.1.0
    container_name: orion-core
    restart: unless-stopped
    ports:
      - "8999:8999"
    volumes:
      - orion-data:/data
    environment:
      ORION_DATA_DIR: /data
      ORION_PORT: "8999"
      ORION_ADMIN_USERNAME: admin
      ORION_ADMIN_PASSWORD: change-me
      ORION_JWT_SECRET: change-me-to-a-long-random-value
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8999/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  orion-data:
