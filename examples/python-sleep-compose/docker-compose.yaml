services:
  orion-core:
    image: ${ORION_CORE_IMAGE:-ghcr.io/sunday-studio/orion-core:latest}
    container_name: orion-example-core
    restart: unless-stopped
    ports:
      - "${ORION_HTTP_PORT:-8999}:8999"
    environment:
      ORION_DATA_DIR: /data
      ORION_PORT: 8999
      ORION_ADMIN_USERNAME: ${ORION_ADMIN_USERNAME:-admin}
      ORION_ADMIN_PASSWORD: ${ORION_ADMIN_PASSWORD:-change-me}
      ORION_JWT_SECRET: ${ORION_JWT_SECRET:-local-example-secret-at-least-long-enough}
    volumes:
      - orion-data:/data

  python-app:
    build:
      context: ./python-app
    container_name: orion-example-python-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ORION_EXAMPLE_PORT: 8080
      ORION_EXAMPLE_FAIL_FILE: /tmp/orion-example-fail

volumes:
  orion-data:
